<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <title>Registrar Gasto - Control de Gastos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="galaxy-layer"></div>
    <div class="waves-container">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-plus-circle"></i> Nuevo Gasto</h1>
            <p class="lead">Registra los gastos de papelería y caja chica</p>
        </div>

        <div class="form-container">
            <div class="card">
                <div class="card-header"><i class="fas fa-edit"></i> Formulario de Registro</div>
                <div class="card-body">
                    {% if error %}
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-triangle"></i> {{ error }}
                        </div>
                    {% endif %}

                    <form method="POST">
                        <div class="form-group">
                            <label for="concepto" class="form-label requerido">
                                <i class="fas fa-tag"></i> Concepto del gasto
                            </label>
                            <input type="text" class="form-control" id="concepto" name="concepto"
                                   placeholder="Ej: Compra de resmas de papel" required>
                            <div class="form-text">Describe claramente en qué se gastó el dinero</div>
                        </div>

                        <div class="form-group">
                            <label for="categoria" class="form-label requerido">
                                <i class="fas fa-folder"></i> Categoría
                            </label>
                            <select class="form-select" id="categoria" name="categoria" required>
                                <option value="">Seleccione una categoría</option>
                                {% for cat in categorias %}
                                    <option value="{{ cat }}">{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="monto" class="form-label requerido">
                                <i class="fas fa-dollar-sign"></i> Monto (Bs)
                            </label>
                            <input type="number" step="0.01" class="form-control" id="monto" name="monto"
                                   placeholder="0.00" required>
                        </div>

                        <div class="form-group" id="justificacionDiv" style="display: none;">
                            <label for="justificacion" class="form-label">
                                <i class="fas fa-pen"></i> Justificación detallada
                            </label>
                            <textarea class="form-control" id="justificacion" name="justificacion"
                                      rows="3" placeholder="Explique detalladamente el motivo del gasto..."></textarea>
                            <div class="form-text">Mínimo 20 caracteres para gastos de mobiliario o imprevistos</div>
                        </div>

                        <div class="btn-group">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Guardar Gasto
                            </button>
                            <a href="/" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Volver al Dashboard
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('categoria').addEventListener('change', function() {
            const justifDiv = document.getElementById('justificacionDiv');
            const categoria = this.value;
            if (categoria === 'Mobiliario' || categoria === 'Imprevistos') {
                justifDiv.style.display = 'block';
                document.getElementById('justificacion').required = true;
            } else {
                justifDiv.style.display = 'none';
                document.getElementById('justificacion').required = false;
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
